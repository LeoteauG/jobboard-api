services:
  postgres:
    image: postgres:15-alpine
    container_name: jobboard_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: jobboard_user
      POSTGRES_PASSWORD: jobboard_pass
      POSTGRES_DB: jobboard_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jobboard_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data:
